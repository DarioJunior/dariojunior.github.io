<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GOOGLE FONTS-->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
  <!-- FONT AWESOME-->
  <script src="https://kit.fontawesome.com/aacb65fea2.js" crossorigin="anonymous"></script>
  <!-- CSS-->
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="./styles/languages.css">
  <link rel="stylesheet" href="./styles/animations.css">


  <title>Dário Junior | Portifólio</title>

<body>
  <div id="home-container">
    <header>
      <div id="navbar">
        <div class="navContent">
          <div class="navLogo">
            <p>DárioJr.</p>
          </div>
          <div class="navLinks">
            <span>
              <a href="">
                <i class="fas fa-home fa-2x icon"></i>
              </a>
              <p>
                home
              </p>
            </span>
            <span>
              <a href="">
                <i class="fas fa-file-code fa-2x icon"></i>
              </a>
              <p>
                Projects
              </p>
            </span>
            <span>
              <a href="">
                <i class="fas fa-envelope fa-2x icon"></i>
              </a>
              <p>
                Projects
              </p>
            </span>
            <span>
              <img class="photoMini" src="./images/photo_mini.jpg" alt="Foto Miniatura">
            </span>
          </div>
        </div>
      </div>
    </header>
    <div >
      <img id="easterEgg" class="dispNone"src="./images/xablau_meme.png" alt="">
    </div>
    <main>
      <div id="mainContent">
        <div class="leftSide">
          <div class="absoluteForTablet">
          <div class="jsIcon">
            <img class="desktopLetters"src="./images/languages/js_letters.png" alt="">
            <img class="tabletLetters" src="./images/languages/js_letters_tablet.png" alt="">
          </div>
          <div class="cssIcon">
            <img class="desktopLetters"src="./images/languages/css_letters.png" alt="">
            <img class="tabletLetters" src="./images/languages/css_letters_tablet.png" alt="">
          </div>
          <div class="htmlIcon">
            <img class="desktopLetters"src="./images/languages/html_letters.png" alt="">
            <img class="tabletLetters" src="./images/languages/html_letters_tablet.png" alt="">
          </div>
          <div class="nodeIcon">
            <img class="desktopLetters"src="./images/languages/node_letters.png" alt="">
            <img class="tabletLetters" src="./images/languages/node_letters_tablet.png" alt="">
          </div>
          <div class="sqlIcon">
            <img class="desktopLetters"src="./images/languages/sql_letters.png" alt="">
            <img class="tabletLetters" src="./images/languages/sql_letters_tablet.png" alt="">
          </div>
          <div class="reactIcon">
            <img class="desktopLetters"src="./images/languages/react_letters.png" alt="">
            <img class="tabletLetters" src="./images/languages/react_letters_tablet.png" alt="">
          </div>
          </div>      
        </div>
        <div class="rightSide">
          <div class="firstParagraph">
            <p>&lt; Hello World /&gt;</p>
          </div>
          <div class="secondParagraph">
            <p>Me chamo Dário Junior, e sou desenvolvedor front-end no início de uma carreira promissória :D
            </p>
            <div class="tabletFormat">
              <p class="tabletParagraph">
                Conheça alguns de meus projetos:
              </p>
            </div>
          </div>
        </div>
        <div class="nextPage" onclick="xablau()">
          <p>Next</p>
          <i class="fas fa-angle-double-down fa-2x"></i>
        </div>
      </div>
    </main>
  </div>
  <script src="./scripts/scripts.js"></script>
